<svg viewBox="0 0 900 130" xmlns="http://www.w3.org/2000/svg" font-family="'Fira Code','JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace" role="img" aria-label="Architecting the future, one commit at a time">
  <defs>
    <linearGradient id="fgold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE7A6"/>
      <stop offset="55%" stop-color="#F5D061"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
    <linearGradient id="fshine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="48%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="52%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="fg" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="fMask">
      <rect width="900" height="130" fill="black"/>
      <text x="450" y="56" text-anchor="middle" fill="white" font-size="30" font-weight="700" letter-spacing="2">ARCHITECTING THE FUTURE</text>
    </mask>
  </defs>

  <text x="450" y="56" text-anchor="middle" fill="url(#fgold)" filter="url(#fg)"
        font-size="30" font-weight="700" letter-spacing="2">ARCHITECTING THE FUTURE</text>
  <g mask="url(#fMask)">
    <rect x="-360" y="20" width="360" height="50" fill="url(#fshine)">
      <animate attributeName="x" values="-360;960" dur="4.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="450" y="88" text-anchor="middle" fill="#A6B4C8" font-size="15" letter-spacing="7">ONE COMMIT AT A TIME</text>

  <!-- self-drawing underline -->
  <line x1="290" y1="104" x2="610" y2="104" stroke="url(#fgold)" stroke-width="1.6" stroke-linecap="round"
        stroke-dasharray="320" stroke-dashoffset="320">
    <animate attributeName="stroke-dashoffset" values="320;0" dur="1.8s" fill="freeze" repeatCount="1"/>
    <animate attributeName="stroke-dashoffset" values="0;0" begin="1.8s" dur="6s" repeatCount="indefinite"/>
  </line>
  <!-- comet on the underline -->
  <circle cx="290" cy="104" r="3" fill="#FFF3C9" filter="url(#fg)">
    <animate attributeName="cx" values="290;610;290" dur="4s" begin="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="4s" begin="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>
