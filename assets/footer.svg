<svg viewBox="0 0 900 130" xmlns="http://www.w3.org/2000/svg" font-family="'Fira Code','JetBrains Mono',ui-monospace,monospace" role="img" aria-label="Architecting the future, one commit at a time">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF6D8"/><stop offset="55%" stop-color="#F5D061"/><stop offset="100%" stop-color="#C9A227"/></linearGradient>
    <linearGradient id="fs" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="48%" stop-color="#fff" stop-opacity="0"/><stop offset="50%" stop-color="#fff" stop-opacity="1"/><stop offset="52%" stop-color="#fff" stop-opacity="0"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></linearGradient>
    <filter id="fgl" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <mask id="fm"><rect width="900" height="130" fill="black"/><text x="450" y="56" text-anchor="middle" fill="white" font-size="30" font-weight="700" letter-spacing="2">ARCHITECTING THE FUTURE</text></mask>
  </defs>

  <text x="450" y="56" text-anchor="middle" fill="url(#fg)" filter="url(#fgl)" font-size="30" font-weight="700" letter-spacing="2">ARCHITECTING THE FUTURE</text>
  <g mask="url(#fm)"><rect x="-380" y="20" width="380" height="52" fill="url(#fs)"><animate attributeName="x" values="-380;980" dur="4.5s" repeatCount="indefinite"/></rect></g>

  <!-- flanking rotating gem ornaments -->
  <g filter="url(#fgl)">
    <g transform="translate(150 46)"><rect x="-6" y="-6" width="12" height="12" fill="none" stroke="url(#fg)" stroke-width="1.4"><animateTransform attributeName="transform" type="rotate" from="45" to="405" dur="11s" repeatCount="indefinite"/></rect></g>
    <g transform="translate(750 46)"><rect x="-6" y="-6" width="12" height="12" fill="none" stroke="url(#fg)" stroke-width="1.4"><animateTransform attributeName="transform" type="rotate" from="45" to="405" dur="11s" repeatCount="indefinite"/></rect></g>
  </g>

  <text x="450" y="88" text-anchor="middle" fill="#A6B4C8" font-size="15" letter-spacing="7">ONE COMMIT AT A TIME</text>

  <line x1="290" y1="104" x2="610" y2="104" stroke="url(#fg)" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="320" stroke-dashoffset="320" filter="url(#fgl)">
    <animate attributeName="stroke-dashoffset" values="320;0" dur="1.8s" fill="freeze"/>
  </line>
  <circle cx="290" cy="104" r="3.2" fill="#FFF6D8" filter="url(#fgl)"><animate attributeName="cx" values="290;610;290" dur="4s" begin="1.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="4s" begin="1.8s" repeatCount="indefinite"/></circle>
</svg>
