<svg viewBox="0 0 920 260" xmlns="http://www.w3.org/2000/svg" font-family="'Fira Code','JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace" role="img" aria-label="Kaustuv Mishra — AI Architect and Enterprise Engineer">
  <defs>
    <!-- Panel background: deep obsidian with a faint warm core -->
    <radialGradient id="panelBg" cx="50%" cy="35%" r="90%">
      <stop offset="0%" stop-color="#15130C"/>
      <stop offset="45%" stop-color="#0C0B0A"/>
      <stop offset="100%" stop-color="#070707"/>
    </radialGradient>

    <!-- Metallic gold, vertical depth -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FCE7A6"/>
      <stop offset="42%" stop-color="#F5D061"/>
      <stop offset="72%" stop-color="#D8A93C"/>
      <stop offset="100%" stop-color="#B7842A"/>
    </linearGradient>

    <!-- Moving shine band -->
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft gold glow -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <!-- Name mask for the shine sweep -->
    <mask id="nameMask">
      <rect width="920" height="260" fill="black"/>
      <text x="460" y="140" text-anchor="middle" fill="white"
            font-size="66" font-weight="700" letter-spacing="4">KAUSTUV&#160;MISHRA</text>
    </mask>
  </defs>

  <!-- Panel -->
  <rect x="6" y="6" width="908" height="248" rx="20" fill="url(#panelBg)" stroke="#F5D061" stroke-opacity="0.28" stroke-width="1.2"/>
  <rect x="6" y="6" width="908" height="248" rx="20" fill="none" stroke="#F5D061" stroke-opacity="0.10" stroke-width="6" filter="url(#softGlow)"/>

  <!-- Faint engineering grid -->
  <g stroke="#F5D061" stroke-opacity="0.05">
    <path d="M6 70 H914 M6 130 H914 M6 190 H914 M180 6 V254 M360 6 V254 M560 6 V254 M740 6 V254"/>
  </g>

  <!-- Art-deco corner brackets (pulse) -->
  <g stroke="url(#gold)" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M28 34 h34 M28 34 v34"/>
    <path d="M892 34 h-34 M892 34 v34"/>
    <path d="M28 226 h34 M28 226 v-34"/>
    <path d="M892 226 h-34 M892 226 v-34"/>
    <animate attributeName="stroke-opacity" values="0.35;1;0.35" dur="3.4s" repeatCount="indefinite"/>
  </g>

  <!-- Floating gold particles -->
  <g fill="#F5D061">
    <circle cx="150" cy="210" r="1.8">
      <animate attributeName="cy" values="215;40" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="220" r="1.4">
      <animate attributeName="cy" values="220;55" dur="9s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="9s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="205" r="1.6">
      <animate attributeName="cy" values="215;45" dur="8s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="8s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="770" cy="225" r="1.3">
      <animate attributeName="cy" values="225;60" dur="10s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="10s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="470" cy="215" r="1.5">
      <animate attributeName="cy" values="220;50" dur="8.5s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.85;0" dur="8.5s" begin="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Prompt tag -->
  <text x="460" y="60" text-anchor="middle" fill="#A6B4C8" font-size="13" letter-spacing="6" opacity="0.85">&gt; INITIALIZING&#160;PROFILE</text>

  <!-- Name (base metallic) -->
  <text x="460" y="140" text-anchor="middle" fill="url(#gold)" filter="url(#glow)"
        font-size="66" font-weight="700" letter-spacing="4">KAUSTUV&#160;MISHRA</text>
  <!-- Shine sweep clipped to the name -->
  <g mask="url(#nameMask)">
    <rect x="-380" y="80" width="380" height="90" fill="url(#shine)">
      <animate attributeName="x" values="-380;980" dur="4.5s" begin="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Subtitle -->
  <text x="460" y="176" text-anchor="middle" fill="#A6B4C8" font-size="16" letter-spacing="5" font-weight="600">AI ARCHITECT&#160;&#160;·&#160;&#160;ENTERPRISE ENGINEER</text>

  <!-- Gold rule with traveling comet -->
  <g>
    <line x1="300" y1="200" x2="620" y2="200" stroke="url(#gold)" stroke-width="1.4" stroke-opacity="0.55"/>
    <circle cx="0" cy="200" r="3.4" fill="#FFF3C9" filter="url(#glow)">
      <animate attributeName="cx" values="300;620;300" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
