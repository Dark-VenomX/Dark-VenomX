<svg viewBox="0 0 900 40" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="divider">
  <defs>
    <linearGradient id="pFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F5D061" stop-opacity="0"/>
      <stop offset="15%" stop-color="#F5D061" stop-opacity="0.8"/>
      <stop offset="85%" stop-color="#F5D061" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F5D061" stop-opacity="0"/>
    </linearGradient>
    <filter id="pg" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Flowing dashed baseline (marching light) -->
  <line x1="30" y1="20" x2="870" y2="20" stroke="url(#pFade)" stroke-width="1.6"
        stroke-dasharray="2 10" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" values="0;-120" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Static faint continuous line under it -->
  <line x1="30" y1="20" x2="870" y2="20" stroke="#F5D061" stroke-width="0.6" stroke-opacity="0.18"/>

  <!-- EKG pulse spike traveling across -->
  <g filter="url(#pg)">
    <path d="M0 20 h14 l6 -11 l6 22 l6 -11 h14" fill="none" stroke="#FFF3C9" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
      <animateTransform attributeName="transform" type="translate" from="30 0" to="800 0" dur="4.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="4.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Leading glow dot -->
  <circle cx="0" cy="20" r="3" fill="#FFFFFF" filter="url(#pg)">
    <animate attributeName="cx" values="30;870" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.92;1" dur="4.2s" repeatCount="indefinite"/>
  </circle>
</svg>
