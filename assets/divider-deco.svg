<svg viewBox="0 0 900 44" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="divider">
  <defs>
    <linearGradient id="dL" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#F5D061" stop-opacity="0"/><stop offset="100%" stop-color="#F5D061" stop-opacity="0.85"/></linearGradient>
    <linearGradient id="dR" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#F5D061" stop-opacity="0.85"/><stop offset="100%" stop-color="#F5D061" stop-opacity="0"/></linearGradient>
    <radialGradient id="md" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFF6D8"/><stop offset="60%" stop-color="#F5D061"/><stop offset="100%" stop-color="#C9A227"/></radialGradient>
    <filter id="mg" x="-300%" y="-300%" width="700%" height="700%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <g stroke-width="1.2">
    <line x1="60" y1="18" x2="410" y2="18" stroke="url(#dL)"/><line x1="90" y1="26" x2="410" y2="26" stroke="url(#dL)" stroke-opacity="0.5"/>
    <line x1="490" y1="18" x2="840" y2="18" stroke="url(#dR)"/><line x1="490" y1="26" x2="810" y2="26" stroke="url(#dR)" stroke-opacity="0.5"/>
  </g>

  <!-- light pulses running inward along the top rules -->
  <g filter="url(#mg)">
    <circle cy="18" r="2.4" fill="#FFF6D8"><animate attributeName="cx" values="80;405" dur="3.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cy="18" r="2.4" fill="#FFF6D8"><animate attributeName="cx" values="820;495" dur="3.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="3.4s" repeatCount="indefinite"/></circle>
  </g>

  <g stroke="#F5D061" stroke-width="1.3" fill="none" stroke-linecap="round">
    <path d="M424 14 L438 22 L424 30"/><path d="M476 14 L462 22 L476 30"/>
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(450 22)" filter="url(#mg)">
    <rect x="-9" y="-9" width="18" height="18" fill="none" stroke="#F5D061" stroke-width="1.4"><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/></rect>
    <rect x="-6" y="-6" width="12" height="12" fill="none" stroke="#F5D061" stroke-width="1.2" stroke-opacity="0.7"><animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="10s" repeatCount="indefinite"/></rect>
    <circle cx="0" cy="0" r="2.6" fill="url(#md)"><animate attributeName="r" values="2.2;3.6;2.2" dur="2.4s" repeatCount="indefinite"/></circle>
    <path d="M0 -13 L1.3 -1.3 L13 0 L1.3 1.3 L0 13 L-1.3 1.3 L-13 0 L-1.3 -1.3 Z" fill="#FFF6D8"><animateTransform attributeName="transform" type="scale" values="0;1;0" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.9;0" dur="3s" repeatCount="indefinite"/></path>
  </g>
</svg>
