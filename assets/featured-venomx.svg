<svg viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" font-family="'Fira Code','JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace" role="img" aria-label="Featured deployment — VenomX by Kaustuv Mishra">
  <defs>
    <radialGradient id="vbg" cx="50%" cy="12%" r="120%"><stop offset="0%" stop-color="#15120A"/><stop offset="55%" stop-color="#0B0A09"/><stop offset="100%" stop-color="#060606"/></radialGradient>
    <linearGradient id="vgold" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF6D8"/><stop offset="45%" stop-color="#F5D061"/><stop offset="72%" stop-color="#D8A93C"/><stop offset="100%" stop-color="#B07C22"/></linearGradient>
    <linearGradient id="vshine" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="46%" stop-color="#fff" stop-opacity="0"/><stop offset="50%" stop-color="#fff" stop-opacity="1"/><stop offset="54%" stop-color="#fff" stop-opacity="0"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></linearGradient>
    <filter id="vg" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="vsoft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7"/></filter>
    <mask id="vmask"><rect width="900" height="440" fill="black"/><text x="450" y="92" text-anchor="middle" fill="white" font-size="46" font-weight="700" letter-spacing="6">VENOMX</text></mask>
  </defs>

  <rect x="6" y="6" width="888" height="428" rx="18" fill="url(#vbg)"/>
  <rect x="6" y="6" width="888" height="428" rx="18" fill="none" stroke="#F5D061" stroke-opacity="0.10" stroke-width="7" filter="url(#vsoft)"/>
  <rect x="6" y="6" width="888" height="428" rx="18" fill="none" stroke="#F5D061" stroke-opacity="0.28" stroke-width="1.2"/>
  <path d="M24 6 H876 A18 18 0 0 1 894 24 V416 A18 18 0 0 1 876 434 H24 A18 18 0 0 1 6 416 V24 A18 18 0 0 1 24 6 Z"
        fill="none" stroke="#FFF6D8" stroke-width="2" stroke-linecap="round" pathLength="1000" stroke-dasharray="50 950" filter="url(#vg)">
    <animate attributeName="stroke-dashoffset" values="0;-1000" dur="7.5s" repeatCount="indefinite"/>
  </path>

  <!-- header -->
  <text x="40" y="42" fill="#F5D061" font-size="12" letter-spacing="4">◇ FEATURED DEPLOYMENT</text>
  <g>
    <rect x="700" y="28" width="152" height="24" rx="12" fill="#0E0C08" stroke="#F5D061" stroke-opacity="0.45"/>
    <circle cx="717" cy="40" r="4" fill="#5FD08A"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/></circle>
    <text x="729" y="44" fill="#F5D061" font-size="11" letter-spacing="0.5" text-decoration="underline">venomx.shop</text>
    <text x="835" y="44" fill="#F5D061" font-size="12" font-weight="700">↗</text>
  </g>

  <text x="450" y="92" text-anchor="middle" fill="url(#vgold)" filter="url(#vg)" font-size="46" font-weight="700" letter-spacing="6">VENOMX</text>
  <g mask="url(#vmask)"><rect x="-360" y="52" width="360" height="56" fill="url(#vshine)"><animate attributeName="x" values="-360;980" dur="5s" begin="1s" repeatCount="indefinite"/></rect></g>
  <text x="450" y="116" text-anchor="middle" fill="#A6B4C8" font-size="12.5" letter-spacing="3">ELITE AUTONOMOUS AI ARCHITECTURES</text>
  <line x1="300" y1="130" x2="600" y2="130" stroke="#F5D061" stroke-opacity="0.4" stroke-width="1"/>

  <!-- LEFT: live APEX pipeline terminal -->
  <g>
    <rect x="40" y="150" width="398" height="232" rx="10" fill="#080807" stroke="#F5D061" stroke-opacity="0.22"/>
    <line x1="40" y1="176" x2="438" y2="176" stroke="#F5D061" stroke-opacity="0.14"/>
    <circle cx="58" cy="163" r="3.6" fill="#F5D061"/><circle cx="70" cy="163" r="3.6" fill="#C9A227"/><circle cx="82" cy="163" r="3.6" fill="#7a5514"/>
    <text x="239" y="167" text-anchor="middle" fill="#A6B4C8" font-size="10" letter-spacing="1">apex — deal-memo synthesis</text>

    <g font-size="12.5">
      <text x="58" y="204" opacity="0"><tspan fill="#F5D061" font-weight="700">❯ </tspan><tspan fill="#A6B4C8">apex --synthesize</tspan><animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.3s" fill="freeze"/></text>
      <text x="58" y="230" fill="#8a97ab" opacity="0">&gt; Initialize Vectorization Matrix...<animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.3s" fill="freeze"/></text>
      <text x="58" y="256" fill="#8a97ab" opacity="0">&gt; Audio extraction complete (42.1s)<animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.3s" fill="freeze"/></text>
      <text x="58" y="282" fill="#8a97ab" opacity="0">&gt; Vision models scanning data-room...<animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.3s" fill="freeze"/></text>
      <text x="58" y="308" fill="#8a97ab" opacity="0">&gt; Cross-referencing ledgers...<animate attributeName="opacity" from="0" to="1" begin="3.3s" dur="0.3s" fill="freeze"/></text>
      <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="4.0s" dur="0.4s" fill="freeze"/>
        <text x="58" y="338" fill="#5FD08A" font-weight="700">✓ DEAL MEMO GENERATED</text>
        <text x="300" y="338" fill="#F5D061">&lt; 60s</text>
      </g>
      <rect x="58" y="356" width="8" height="13" fill="#F5D061"><animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="1s" repeatCount="indefinite"/></rect>
    </g>
  </g>

  <!-- RIGHT: product modules -->
  <g>
    <!-- module template repeated -->
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.4s" fill="freeze"/>
      <rect x="462" y="150" width="396" height="52" rx="9" fill="#0E0C08" stroke="#F5D061" stroke-opacity="0.25"/>
      <rect x="474" y="168" width="16" height="16" rx="3" fill="none" stroke="url(#vgold)" stroke-width="1.4"><animateTransform attributeName="transform" type="rotate" from="45 482 176" to="405 482 176" dur="12s" repeatCount="indefinite"/></rect>
      <text x="504" y="172" fill="#F5D061" font-size="14" font-weight="700">APEX</text>
      <text x="504" y="189" fill="#A6B4C8" font-size="10.5">Autonomous VC / PE deal-memo synthesis</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.35s" dur="0.4s" fill="freeze"/>
      <rect x="462" y="208" width="396" height="52" rx="9" fill="#0E0C08" stroke="#F5D061" stroke-opacity="0.25"/>
      <circle cx="482" cy="234" r="8" fill="none" stroke="url(#vgold)" stroke-width="1.4"/><circle cx="482" cy="234" r="3" fill="#F5D061"><animate attributeName="r" values="2;4;2" dur="1.8s" repeatCount="indefinite"/></circle>
      <text x="504" y="230" fill="#F5D061" font-size="14" font-weight="700">AURA</text>
      <text x="504" y="247" fill="#A6B4C8" font-size="10.5">Sub-500ms neural voice infrastructure</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.60s" dur="0.4s" fill="freeze"/>
      <rect x="462" y="266" width="396" height="52" rx="9" fill="#0E0C08" stroke="#F5D061" stroke-opacity="0.25"/>
      <polygon points="476,284 492,292 476,300" fill="url(#vgold)"/>
      <text x="504" y="288" fill="#F5D061" font-size="14" font-weight="700">BRAINROT.AI</text>
      <text x="504" y="305" fill="#A6B4C8" font-size="10.5">Autonomous short-form video factory</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.85s" dur="0.4s" fill="freeze"/>
      <rect x="462" y="324" width="396" height="52" rx="9" fill="#0E0C08" stroke="#F5D061" stroke-opacity="0.25"/>
      <g stroke="url(#vgold)" stroke-width="1.4" fill="none"><rect x="475" y="343" width="6" height="6"/><rect x="484" y="343" width="6" height="6"/><rect x="475" y="352" width="6" height="6"/><rect x="484" y="352" width="6" height="6"/></g>
      <text x="504" y="346" fill="#F5D061" font-size="14" font-weight="700">UTILITY HUB</text>
      <text x="504" y="363" fill="#A6B4C8" font-size="10.5">Multimodal command center</text>
    </g>
  </g>

  <!-- footer: tech + credit -->
  <text x="450" y="406" text-anchor="middle" fill="#8a97ab" font-size="11" letter-spacing="1">Whisper · Hugging Face · BERT · Dialogflow · Multimodal Agents</text>
  <text x="450" y="424" text-anchor="middle" fill="#F5D061" font-size="10" letter-spacing="2" opacity="0.8">ARCHITECTED BY KAUSTUV MISHRA</text>
</svg>
