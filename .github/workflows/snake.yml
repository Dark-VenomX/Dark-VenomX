name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake over the contribution calendar
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # color_dots = [empty-day, level1, level2, level3, level4]
          # empty-day is a FAINT visible square so the whole calendar grid shows,
          # brighter gold = more contributions; color_snake = the snake body.
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23FFF6D8&color_dots=%232a2412,%235c4a12,%238a6b1a,%23d8a93c,%23F5D061
            dist/github-contribution-grid-snake.svg?color_snake=%23C9A227&color_dots=%23ebedf0,%23f5e7bf,%23f0d98a,%23e7c24d,%23F5D061

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
