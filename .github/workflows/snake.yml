name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # refresh twice a day
  workflow_dispatch:          # run manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23F5D061&color_dots=%23161b22,%233b2f0b,%237a6417,%23c9a227,%23F5D061
            dist/github-contribution-grid-snake.svg?color_snake=%23F5D061&color_dots=%23ebedf0,%23f5e7bf,%23f0d98a,%23e7c24d,%23F5D061

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
