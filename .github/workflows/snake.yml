name: Generate Contribution Snake

on:
  schedule:
    # every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate the growing-snake SVG from live contribution data
        env:
          # GITHUB_TOKEN can read a public contribution calendar. If yours comes
          # back empty, create a classic PAT with `read:user` scope, add it as a
          # repo secret (e.g. SNAKE_TOKEN) and swap it in here.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: ${{ github.repository_owner }}
        run: |
          python scripts/generate_snake.py dist/contribution-matrix.svg

      - name: Push the SVG to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
